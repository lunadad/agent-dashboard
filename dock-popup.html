<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dock</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin:0; background: transparent; font-family: Inter, Pretendard, sans-serif; }
    .dock {
      margin: 0;
      display:flex; gap:12px; align-items:flex-end;
      padding:10px 12px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.2);
      background: rgba(10,15,25,.72);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 35px rgba(0,0,0,.35);
      -webkit-app-region: drag;
    }
    .item {
      width: 74px; text-align:center; color:#e5e7eb; position:relative;
      -webkit-app-region: no-drag;
      cursor:pointer;
      transition: transform .16s ease;
    }
    .item:hover { transform: translateY(-8px) scale(1.08); }
    .avatar {
      width:56px; height:56px; border-radius: 16px; margin: 0 auto 6px;
      background-size: cover; background-position:center;
      border:2px solid rgba(255,255,255,.25);
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
    }
    .name { font-size:11px; font-weight:700; }
    .badge {
      position:absolute; right:0; top:-8px;
      font-size:10px; padding:2px 6px; border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
      background:#111827; color:#d1d5db;
    }
    .working { color:#16a34a; background:#ecfdf5; border-color:#86efac; }
    .bubble {
      position:absolute; bottom:76px; left:50%; transform:translateX(-50%) translateY(6px);
      font-size:11px; white-space:nowrap; opacity:0;
      background:#0f172a; color:#e2e8f0; border:1px solid #334155;
      border-radius:10px; padding:6px 8px;
      transition: all .14s ease;
      pointer-events:none;
    }
    .item:hover .bubble { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="dock">
    <div class="item" onclick="openMain('luna')">
      <div class="bubble">루나봇 · 총괄</div>
      <div class="avatar" style="background-image:url('./assets/luna.jpg')"></div>
      <span class="badge working">작업중</span>
      <div class="name">루나봇</div>
    </div>
    <div class="item" onclick="openMain('kurina')">
      <div class="bubble">카리나 · 아트</div>
      <div class="avatar" style="background-image:url('./assets/karina.jpg')"></div>
      <span class="badge">대기</span>
      <div class="name">카리나</div>
    </div>
    <div class="item" onclick="openMain('musku')">
      <div class="bubble">머스크 · 투자</div>
      <div class="avatar" style="background-image:url('./assets/musk.png')"></div>
      <span class="badge working">작업중</span>
      <div class="name">머스크</div>
    </div>
  </div>

  <script>
    function openMain(agentId) {
      const url = `https://lunadad.github.io/agent-dashboard/?agent=${agentId}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
